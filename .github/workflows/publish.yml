name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for source changes since last tag
        id: changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found — will publish"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- src/ bin/ templates/ scripts/ skills/ openclaw-config/ package.json tsconfig.json setup.sh)
            if [ -n "$CHANGED" ]; then
              echo "Source files changed since $LAST_TAG"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "No source changes since $LAST_TAG — skipping publish"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Build TypeScript
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "$NEW_VERSION"

      - name: Publish to npm
        if: steps.changes.outputs.changed == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version commit and tag
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin main
          git push origin ${{ steps.version.outputs.version }}
