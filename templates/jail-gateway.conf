# OpenClawPro Fail2ban jail for gateway
# Monitors gateway access log for brute-force attempts

[openclaw-gateway]
enabled = true
port = 18789
logpath = /var/log/openclaw-gateway.log
filter = openclaw-gateway
maxretry = 5
findtime = 600
bantime = 3600
action = ufw[name=OpenClaw, port=18789, protocol=tcp]
